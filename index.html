  <script>
    if ("serviceWorker" in navigator) {
      const isInIframe = (() => { try { return window.self !== window.top; } catch (e) { return true; } })();
      const isPreviewHost = window.location.hostname.includes("id-preview--") || window.location.hostname.includes("lovableproject.com");
      if (!isPreviewHost && !isInIframe) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js").then((reg) => {
            // Force the new SW to take over immediately when found.
            const promote = (sw) => sw && sw.postMessage && sw.postMessage("SKIP_WAITING");
            if (reg.waiting) promote(reg.waiting);
            reg.addEventListener("updatefound", () => {
              const nw = reg.installing;
              if (!nw) return;
              nw.addEventListener("statechange", () => {
                if (nw.state === "installed" && navigator.serviceWorker.controller) promote(nw);
              });
            });
            // Check for updates when tab regains focus.
            document.addEventListener("visibilitychange", () => {
              if (document.visibilityState === "visible") reg.update().catch(() => {});
            });
          }).catch(() => {});
          // When the controlling SW changes, reload once so the user sees fresh assets.
          let refreshing = false;
          navigator.serviceWorker.addEventListener("controllerchange", () => {
            if (refreshing) return;
            refreshing = true;
            window.location.reload();
          });
        });
      }
    }
  </script>
