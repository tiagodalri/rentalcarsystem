  <script>
    (function () {
      var isAdmin = (window.location.pathname || "").indexOf("/admin") === 0;
      if (!isAdmin || !("serviceWorker" in navigator)) return;

      // Back-office não pode ficar preso em app-shell/chunks antigos do PWA.
      // Em iOS/Safari, unregister sozinho NÃO tira o service worker do controle
      // da aba atual; por isso, quando havia SW/cache ativo, limpamos e fazemos
      // um reload único com cache-buster ANTES do React terminar de navegar.
      var reloadParam = "__zeus_admin_fresh";
      var recoverParam = "__zeus_admin_recover";
      var legacyRecoverParam = "__zeus_refresh";
      var url = new URL(window.location.href);
      var alreadyReloaded = url.searchParams.has(reloadParam) || url.searchParams.has(recoverParam) || url.searchParams.has(legacyRecoverParam);

      var registrationsPromise = navigator.serviceWorker.getRegistrations()
        .then(function (registrations) {
          return Promise.all(registrations.map(function (registration) {
            return registration.unregister().catch(function () {});
          })).then(function () { return registrations.length; });
        })
        .catch(function () { return 0; });

      var cachesPromise = ("caches" in window)
        ? caches.keys()
            .then(function (keys) {
              return Promise.all(keys.map(function (key) {
                return caches.delete(key).catch(function () {});
              })).then(function () { return keys.length; });
            })
            .catch(function () { return 0; })
        : Promise.resolve(0);

      Promise.all([registrationsPromise, cachesPromise]).then(function (results) {
        var hadPwaState = !!navigator.serviceWorker.controller || results[0] > 0 || results[1] > 0;
        if (!hadPwaState) {
          if (alreadyReloaded && window.history && window.history.replaceState) {
            url.searchParams.delete(reloadParam);
            url.searchParams.delete(recoverParam);
            url.searchParams.delete(legacyRecoverParam);
            window.history.replaceState(null, "", url.toString());
          }
          return;
        }
        if (alreadyReloaded) return;
        url.searchParams.set(reloadParam, String(Date.now()));
        window.location.replace(url.toString());
      }).catch(function () {});
    })();
  </script>

  <script>
    if ("serviceWorker" in navigator) {
      const isInIframe = (() => { try { return window.self !== window.top; } catch (e) { return true; } })();
      const isPreviewHost = window.location.hostname.includes("id-preview--") || window.location.hostname.includes("lovableproject.com");
      const isAdmin = (window.location.pathname || "").indexOf("/admin") === 0;
      if (!isPreviewHost && !isInIframe && !isAdmin) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js").then((reg) => reg.update()).catch(() => {});
          // Intentionally NOT calling reg.update() on visibilitychange and
          // NOT reloading on controllerchange. New service worker versions
          // take effect on the next full navigation, so users never get
          // kicked out of a form they're filling in.
        });
      }
    }
  </script>

  <body>
    <!-- Boot splash: paints brand background + logo instantly, before React/CSS bundle.
         Eliminates white flash on cold start (browser + installed PWA).
         Hidden as soon as React mounts the root. -->
    <style>
      html, body { background-color: #0a0a0a; }
      @media (prefers-color-scheme: light) {
        html, body { background-color: #fafafa; }
      }
      #boot-splash {
        position: fixed; inset: 0; z-index: 2147483647;
        display: flex; align-items: center; justify-content: center;
        background-color: #0a0a0a;
        transition: opacity 320ms ease-out;
        -webkit-tap-highlight-color: transparent;
      }
      @media (prefers-color-scheme: light) {
        #boot-splash { background-color: #fafafa; }
      }
      #boot-splash img {
        width: 84px; height: 84px; object-fit: contain;
        animation: bootPulse 1400ms ease-in-out infinite;
        opacity: 0.95;
      }
      #boot-splash.boot-hide { opacity: 0; pointer-events: none; }
      @keyframes bootPulse {
        0%, 100% { transform: scale(1);    opacity: 0.85; }
        50%      { transform: scale(1.06); opacity: 1;    }
      }
      @media (prefers-reduced-motion: reduce) {
        #boot-splash img { animation: none; opacity: 1; }
      }
    </style>
    <div id="boot-splash" aria-hidden="true">
      <img src="/zeus-z-mark.png" alt="" />
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Remove boot splash once React paints the root (or after a safety timeout).
      (function () {
        var splash = document.getElementById("boot-splash");
        if (!splash) return;
        var done = false;
        function hide() {
          if (done) return;
          done = true;
          splash.classList.add("boot-hide");
          setTimeout(function () { splash.remove(); }, 360);
        }
        var root = document.getElementById("root");
        if (root) {
          var mo = new MutationObserver(function () {
            if (root.childElementCount > 0) { mo.disconnect(); hide(); }
          });
          mo.observe(root, { childList: true });
        }
        // Safety net: hide after 4s no matter what.
        setTimeout(hide, 4000);
      })();
    </script>
